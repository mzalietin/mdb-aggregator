server.port=8082
server.servlet.context-path=/api

spring.application.admin.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/movie_review_data
spring.datasource.username=dev_user
spring.datasource.password=example
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop

#spring.kafka.listener.poll-timeout=3000
#spring.kafka.listener.concurrency=1
#spring.kafka.listener.ack-mode=MANUAL_IMMEDIATE

spring.kafka.consumer.bootstrap.servers=${kafka.host}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.isolation.level=read_committed
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

movie.review.context.kafka.out.events-topic=movie-review-events
movie.review.context.kafka.in.user-events-topic=user-events

spring.kafka.producer.key-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.transaction-id-prefix=movie-review-tx-
spring.kafka.producer.properties.spring.json.type.mapping=\
  review_created:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.out.MovieReviewCreated,\
  review_updated:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.out.MovieReviewUpdated,\
  review_deleted:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.out.MovieReviewDeleted,\
  review_key:me.mzalietin.mdbproject.moviereview.domain.model.MovieReviewKey
