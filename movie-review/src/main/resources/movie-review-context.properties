server.port=8082

spring.application.admin.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/movie_review_data
spring.datasource.username=dev_user
spring.datasource.password=example
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.data.rest.basePath=/api

spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.concurrency=1

spring.kafka.consumer.bootstrap.servers=${kafka.host}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.validator.class=org.springframework.validation.beanvalidation.LocalValidatorFactoryBean
spring.kafka.consumer.properties.spring.json.key.default.type=me.mzalietin.mdbproject.moviereview.domain.model.MovieReviewKey
spring.kafka.consumer.properties.spring.json.value.default.type=java.lang.Object
spring.kafka.consumer.properties.spring.json.trusted.packages=me.mzalietin.mdbproject.moviereview.infrastructure.broker.event,java.lang
spring.kafka.consumer.properties.spring.json.type.mapping=review_created:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.MovieReviewCreated,review_updated:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.MovieReviewUpdated,review_deleted:me.mzalietin.mdbproject.moviereview.infrastructure.broker.event.MovieReviewDeleted

movie.review.context.kafka.events-topic=movie-review-events
movie.review.context.kafka.user-events-topic=user-events
movie.review.context.kafka.dlt=movie-review-context-consumer-DLT

spring.kafka.producer.key-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
