plugins {
    id 'java-library'
    id 'org.springframework.boot' version "${spring_boot_plugin_version}"
    id 'io.spring.dependency-management' version "${spring_dependency_management_plugin_version}"
    id 'maven-publish'
}

group = 'com.mzaletsin.selfstudy'
version = "${version}"

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    runtimeOnly "org.hibernate.validator:hibernate-validator:${hibernate_validator_version}"

    implementation project(':adapter:imdb-aggregator-api')
    implementation project(':adapter:imdb-aggregator-infrastructure')
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

test {
    useJUnitPlatform()
}
