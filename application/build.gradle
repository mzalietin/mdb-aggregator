plugins {
    id 'java-library'
    id 'org.springframework.boot' version "${spring_boot_version}"
}

group = 'com.mzaletsin.selfstudy'
version = "${version}"
sourceCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.springframework.boot:spring-boot-starter:${spring_boot_version}"
    implementation "org.springframework.boot:spring-boot-starter-web:${spring_boot_version}"
    runtimeOnly "org.hibernate.validator:hibernate-validator:${hibernate_validator_version}"

    implementation project(':imdb-aggregator-api')
    implementation project(':imdb-aggregator-infrastructure')
}

test {
    useJUnitPlatform()
}
