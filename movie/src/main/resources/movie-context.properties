server.port=8081

spring.application.admin.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/movie_data
spring.datasource.username=dev_user
spring.datasource.password=example
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.data.rest.basePath=/api

spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.concurrency=1

spring.kafka.consumer.bootstrap.servers=${kafka.host}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.key.default.type=java.lang.String
spring.kafka.consumer.properties.spring.json.value.default.type=me.mzalietin.imdbproject.movie.infrastructure.broker.event.MovieRatingUpdated
spring.kafka.consumer.properties.spring.json.trusted.packages=me.mzalietin.imdbproject.movie.infrastructure.broker.event,java.lang
