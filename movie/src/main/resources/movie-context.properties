server.port=8081

spring.application.admin.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/movie_data
spring.datasource.username=mdb_service_user
spring.datasource.password=18cfaa9f5
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.kafka.listener.poll-timeout=3000
spring.kafka.listener.concurrency=1
spring.kafka.listener.ack-mode=MANUAL_IMMEDIATE

spring.kafka.consumer.bootstrap.servers=${kafka.host}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.key.default.type=java.lang.String
spring.kafka.consumer.properties.spring.json.value.default.type=me.mzalietin.mdbproject.movie.infrastructure.broker.event.MovieRatingCalculated
spring.kafka.consumer.properties.spring.json.trusted.packages=me.mzalietin.mdbproject.movie.infrastructure.broker.event,java.lang

movie.context.kafka.dlt=movie-context-consumer-DLT
movie.context.kafka.out.events-topic=movie-events

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=\
  movie_created:me.mzalietin.mdbproject.movie.infrastructure.broker.event.out.MovieCreated,\
  movie_rating_updated:me.mzalietin.mdbproject.movie.infrastructure.broker.event.out.MovieRatingUpdated
