server.port=8083
server.servlet.context-path=/api

spring.application.admin.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/app_user_data
spring.datasource.username=dev_user
spring.datasource.password=example
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop

spring.kafka.producer.bootstrap.servers=${kafka.host}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.transaction-id-prefix=user-tx-

user.context.kafka.out.events-topic=user-events
