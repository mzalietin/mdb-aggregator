services:
    db:
        image: postgres:15.17
        restart: always
        shm_size: 128mb
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: dev_user
            POSTGRES_PASSWORD: example
        volumes:
            - ./scripts/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
